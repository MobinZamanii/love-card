<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>June 21 — I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: Georgia, serif;
  }
  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .date-badge {
    font-size: 15px;
    letter-spacing: 4px;
    color: #ffb3c6;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    text-shadow: 0 0 20px rgba(255, 100, 130, 0.8);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .heart-wrapper {
    position: relative;
    width: 300px;
    height: 300px;
  }
  canvas#heart {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  #orbit-svg {
    position: absolute;
    top: 0; left: 0;
    width: 300px;
    height: 300px;
    animation: spin 9s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .tagline {
    font-size: 28px;
    font-style: italic;
    color: #fff;
    letter-spacing: 3px;
    animation: glow 2.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(255,80,120,0.8), 0 0 40px rgba(255,80,120,0.4); }
    50%       { text-shadow: 0 0 40px rgba(255,150,180,1), 0 0 80px rgba(255,80,120,0.7); }
  }
  .subtitle {
    font-size: 13px;
    color: rgba(200, 180, 255, 0.7);
    letter-spacing: 2px;
    font-family: sans-serif;
  }

  .rose-petal{
    position:fixed;
    top:-20px;
    color:#ff6b8a;
    pointer-events:none;
    z-index:3;
    animation:fall linear forwards;
    text-shadow:0 0 10px rgba(255,120,150,.6);
  }
  @keyframes fall{
    from{transform:translateY(-30px) rotate(0deg);opacity:0}
    10%{opacity:1}
    to{transform:translateY(110vh) rotate(360deg);opacity:.8}
  }


.envelope-btn{
 position:fixed;bottom:30px;right:30px;z-index:50;
 background:rgba(255,255,255,.1);backdrop-filter:blur(8px);
 border:1px solid rgba(255,255,255,.2);
 color:white;padding:12px 18px;border-radius:14px;cursor:pointer;
}
.letter-overlay{
 display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
 z-index:100;align-items:center;justify-content:center;
}
.letter{
 width:min(700px,90vw);background:#fff8f0;color:#222;
 padding:40px;border-radius:12px;
 transform:scale(.2) rotate(-10deg);
 transition:.8s;
 box-shadow:0 0 40px rgba(0,0,0,.4);
 text-align:center;
}
.letter-overlay.show{display:flex;}
.letter-overlay.show .letter{transform:scale(1) rotate(0deg);}
.letter h2{margin-bottom:20px;}
.heart-particle{
 position:fixed;pointer-events:none;z-index:60;
 animation:burst 1.2s forwards;
}
@keyframes burst{
 from{opacity:1;transform:translate(0,0) scale(1);}
 to{opacity:0;transform:translate(var(--x),var(--y)) scale(.2);}
}
.rose-photo{
 position:fixed;pointer-events:none;z-index:3;font-size:24px;
 animation:fallRose linear forwards;
}
@keyframes fallRose{
 from{transform:translateY(-40px) rotate(0deg);opacity:0;}
 10%{opacity:1;}
 to{transform:translateY(110vh) rotate(540deg);opacity:.9;}
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="card">
  <div class="date-badge">✦ June 21 ✦</div>

  <div class="heart-wrapper">
    <canvas id="heart" width="200" height="200"></canvas>

    <svg id="orbit-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="circle-path" d="M 150,150 m -118,0 a 118,118 0 1,1 236,0 a 118,118 0 1,1 -236,0"/>
      </defs>
      <text font-size="14" font-family="Georgia, serif" font-weight="bold" fill="#ff6b8a" letter-spacing="8">
        <textPath href="#circle-path" startOffset="0%">
          ♥ I LOVE YOU ♥ I LOVE YOU ♥ I LOVE YOU ♥ I LOVE YOU ♥
        </textPath>
      </text>
    </svg>
  </div>

  <div class="tagline">I Love You</div>
  <div class="subtitle">forever &amp; always ✦</div>
</div>

<script>
// === GALAXY BACKGROUND ===
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const stars = [];
const floatingHearts = [];

for (let i = 0; i < 320; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.6 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.8 + 0.3
  });
}

for (let i = 0; i < 40; i++) {
  floatingHearts.push({
    x: Math.random(), y: Math.random(),
    size: Math.random() * 10 + 7,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.4 + 0.1,
    alpha: Math.random() * 0.3 + 0.1
  });
}

let bgTime = 0;
function drawBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);

  const grad = bgCtx.createRadialGradient(w*0.5,h*0.4,0, w*0.5,h*0.4,w*0.8);
  grad.addColorStop(0, 'rgba(30,0,60,1)');
  grad.addColorStop(0.4, 'rgba(10,0,30,1)');
  grad.addColorStop(1, 'rgba(0,0,10,1)');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0,0,w,h);

  const neb1 = bgCtx.createRadialGradient(w*0.25,h*0.3,0, w*0.25,h*0.3,w*0.35);
  neb1.addColorStop(0,'rgba(120,0,80,0.25)'); neb1.addColorStop(1,'rgba(0,0,0,0)');
  bgCtx.fillStyle = neb1; bgCtx.fillRect(0,0,w,h);

  const neb2 = bgCtx.createRadialGradient(w*0.75,h*0.6,0, w*0.75,h*0.6,w*0.3);
  neb2.addColorStop(0,'rgba(0,60,140,0.2)'); neb2.addColorStop(1,'rgba(0,0,0,0)');
  bgCtx.fillStyle = neb2; bgCtx.fillRect(0,0,w,h);

  bgTime += 0.016;

  for (const s of stars) {
    const alpha = 0.3 + 0.7*(0.5 + 0.5*Math.sin(bgTime*s.speed+s.phase));
    bgCtx.beginPath();
    bgCtx.arc(s.x*w, s.y*h, s.r, 0, Math.PI*2);
    bgCtx.fillStyle = `rgba(255,240,255,${alpha})`;
    bgCtx.fill();
  }

  for (const p of floatingHearts) {
    const px = p.x*w + Math.sin(bgTime*p.speed+p.phase)*25;
    const py = p.y*h + Math.cos(bgTime*p.speed*0.7+p.phase)*18;
    const a  = p.alpha*(0.5 + 0.5*Math.sin(bgTime*p.speed*2+p.phase));
    bgCtx.font = `${p.size}px serif`;
    bgCtx.fillStyle = `rgba(255,80,130,${a})`;
    bgCtx.fillText('♥', px, py);
  }

  requestAnimationFrame(drawBg);
}

  if(bgTime > nextMeteor){
    spawnMeteor();
    nextMeteor = bgTime + 1.5 + Math.random()*2.5;
  }

  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.life -= 0.02;
    if(m.life<=0){ meteors.splice(i,1); continue; }

    const ex = m.x + Math.cos(m.angle)*m.len*(1-m.life);
    const ey = m.y + Math.sin(m.angle)*m.len*(1-m.life);

    const g = bgCtx.createLinearGradient(m.x,m.y,ex,ey);
    g.addColorStop(0,`rgba(255,255,255,${m.life})`);
    g.addColorStop(1,'rgba(255,255,255,0)');

    bgCtx.beginPath();
    bgCtx.moveTo(m.x,m.y);
    bgCtx.lineTo(ex,ey);
    bgCtx.strokeStyle=g;
    bgCtx.lineWidth=2;
    bgCtx.stroke();
  }

drawBg();

// === 3D HEART ===
const hCanvas = document.getElementById('heart');
const hCtx   = hCanvas.getContext('2d');
const W = 200, H = 200;
let angle = 0;

function hx(t){ return 16*Math.pow(Math.sin(t),3); }
function hy(t){ return -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)); }

function draw3DHeart() {
  hCtx.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2+2, scale=6.8;
  const pts=[];
  for (let i=0;i<=200;i++){
    const t=(i/200)*Math.PI*2;
    const x3=hx(t)*scale, y3=hy(t)*scale;
    const cosA=Math.cos(angle), sinA=Math.sin(angle);
    const rx=x3*cosA, rz=x3*sinA;
    pts.push({px:cx+rx, py:cy+y3, depth:(rz+100)/200});
  }

  for (let layer=5;layer>=1;layer--){
    hCtx.beginPath();
    for (let i=0;i<pts.length;i++){
      const p=pts[i];
      if(i===0) hCtx.moveTo(p.px+layer*1.4, p.py+layer*1.2);
      else       hCtx.lineTo(p.px+layer*1.4, p.py+layer*1.2);
    }
    hCtx.closePath();
    hCtx.fillStyle=`rgba(130,0,35,${0.13-layer*0.018})`;
    hCtx.fill();
  }

  hCtx.beginPath();
  for (let i=0;i<pts.length;i++){
    const p=pts[i];
    if(i===0) hCtx.moveTo(p.px,p.py);
    else       hCtx.lineTo(p.px,p.py);
  }
  hCtx.closePath();
  const grad=hCtx.createRadialGradient(cx-15,cy-15,4, cx,cy,82);
  grad.addColorStop(0,'rgba(255,155,175,0.97)');
  grad.addColorStop(0.3,'rgba(235,30,75,0.97)');
  grad.addColorStop(0.7,'rgba(175,0,48,0.97)');
  grad.addColorStop(1,'rgba(95,0,28,0.97)');
  hCtx.fillStyle=grad; hCtx.fill();

  const shim=hCtx.createRadialGradient(cx-22,cy-26,1, cx-18,cy-22,42);
  shim.addColorStop(0,'rgba(255,255,255,0.55)');
  shim.addColorStop(1,'rgba(255,255,255,0)');
  hCtx.fillStyle=shim; hCtx.fill();

  hCtx.beginPath();
  for (let i=0;i<pts.length;i++){
    const p=pts[i];
    if(i===0) hCtx.moveTo(p.px,p.py);
    else       hCtx.lineTo(p.px,p.py);
  }
  hCtx.closePath();
  hCtx.strokeStyle='rgba(255,180,200,0.5)';
  hCtx.lineWidth=1.5;
  hCtx.stroke();

  angle+=0.012;
  requestAnimationFrame(draw3DHeart);
}
draw3DHeart();

// === ROSE PETALS ===
function createRosePetal(){
  const p=document.createElement('div');
  p.className='rose-petal';
  p.innerHTML='🌹';
  p.style.left=Math.random()*100+'vw';
  p.style.fontSize=(14+Math.random()*22)+'px';
  p.style.animationDuration=(8+Math.random()*8)+'s';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),17000);
}
setInterval(createRosePetal,450);


document.querySelector('.envelope-btn').onclick=()=>{
 document.getElementById('letterBox').classList.add('show');
 document.getElementById('bdayMusic').play().catch(()=>{});
};
document.getElementById('letterBox').onclick=(e)=>{
 if(e.target.id==='letterBox') e.target.classList.remove('show');
};

const heartCanvas=document.getElementById('heart');
heartCanvas.addEventListener('click',(e)=>{
 for(let i=0;i<25;i++){
   const p=document.createElement('div');
   p.className='heart-particle';
   p.innerHTML='❤️';
   p.style.left=(e.clientX)+'px';
   p.style.top=(e.clientY)+'px';
   p.style.setProperty('--x',((Math.random()-.5)*250)+'px');
   p.style.setProperty('--y',((Math.random()-.5)*250)+'px');
   document.body.appendChild(p);
   setTimeout(()=>p.remove(),1200);
 }
});

function createRealRose(){
 const r=document.createElement('div');
 r.className='rose-photo';
 r.innerHTML='🌹';
 r.style.left=Math.random()*100+'vw';
 r.style.fontSize=(18+Math.random()*18)+'px';
 r.style.animationDuration=(10+Math.random()*8)+'s';
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),18000);
}
setInterval(createRealRose,350);

</script>

<button class="envelope-btn">✉️ Open Letter</button>
<div class="letter-overlay" id="letterBox">
  <div class="letter">
    <h2>❤️ For You ❤️</h2>
    <p style="font-size:22px;line-height:1.8;">
      You are in every tiny piece of my existence.<br>
      Only you live in every particle of my soul, my thoughts, and my heart.
    </p>
  </div>
</div>

<audio id="bdayMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</body>
</html>
